<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Emlak Portföy Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
        .akin-card { background: white; border-top: 5px solid #1a56db; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .auth-tab.active { border-bottom: 3px solid #1a56db; color: #1a56db; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen">
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-700 text-white p-2 rounded-lg font-bold">EP</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tight">EMLAK<span class="text-blue-700">PORTFÖY</span></h1>
        </div>
        <div id="userInfo" class="hidden items-center gap-4">
            <span id="userEmail" class="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1 rounded-full"></span>
            <button onclick="logout()" class="text-red-600 text-sm font-bold hover:underline">Çıkış</button>
        </div>
    </nav>

    <div id="authSection" class="max-w-md mx-auto mt-20 p-4">
        <div class="akin-card overflow-hidden">
            <div class="flex border-b">
                <button id="loginTab" onclick="toggleAuth(true)" class="auth-tab active flex-1 py-4 text-center">Giriş Yap</button>
                <button id="registerTab" onclick="toggleAuth(false)" class="auth-tab flex-1 py-4 text-center text-gray-500">Personel Kaydı</button>
            </div>

            <div class="p-8">
                <div id="loginForm">
                    <input type="email" id="email" placeholder="E-posta" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="password" placeholder="Şifre" class="w-full border p-3 rounded-lg mb-6 outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="login()" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold hover:bg-blue-800 transition">SİSTEME GİR</button>
                </div>

                <div id="registerForm" class="hidden text-center">
                    <p class="text-xs text-gray-400 mb-4">* Maksimum 12 personel sınırı vardır.</p>
                    <input type="text" id="regName" placeholder="Ad Soyad" class="w-full border p-3 rounded-lg mb-4 outline-none">
                    <input type="email" id="regEmail" placeholder="E-posta" class="w-full border p-3 rounded-lg mb-4 outline-none">
                    <input type="password" id="regPass" placeholder="Şifre Oluştur" class="w-full border p-3 rounded-lg mb-6 outline-none">
                    <button onclick="register()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold hover:bg-green-700">KAYIT OL VE BAŞLA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainSection" class="hidden max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4">
            <div class="akin-card p-6 sticky top-24">
                <h3 class="font-bold border-b pb-3 mb-5 text-gray-800">📋 YENİ İLAN</h3>
                <div class="space-y-4">
                    <select id="pKategori" class="w-full border p-2.5 rounded-lg bg-gray-50 font-semibold">
                        <option value="Satılık Konut">🏠 Satılık Konut</option>
                        <option value="Kiralık Konut">🔑 Kiralık Konut</option>
                        <option value="Satılık Arsa">🌳 Satılık Arsa</option>
                        <option value="İş Yeri">🏢 İş Yeri / Ofis</option>
                        <option value="Devren">🔄 Devren</option>
                    </select>
                    <input type="text" id="pBaslik" placeholder="İlan Başlığı" class="w-full border p-2.5 rounded-lg">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="pIl" placeholder="İl" class="border p-2.5 rounded-lg">
                        <input type="text" id="pIlce" placeholder="İlçe" class="border p-2.5 rounded-lg">
                    </div>
                    <textarea id="pAdres" placeholder="Mahalle ve Adres Detayı" class="w-full border p-2.5 rounded-lg h-20"></textarea>
                    <input type="number" id="pFiyat" placeholder="Fiyat (₺)" class="w-full border p-2.5 rounded-lg font-bold text-blue-700">
                    
                    <div class="border-2 border-dashed border-blue-200 p-4 rounded-xl bg-blue-50 text-center relative">
                        <label class="cursor-pointer block">
                            <span class="text-2xl">📸</span>
                            <span class="block text-sm font-bold text-blue-700 mt-1">FOTOĞRAF EKLE</span>
                            <input type="file" id="pGorsel" multiple accept="image/*" class="hidden">
                        </label>
                        <div id="fileStatus" class="text-[10px] mt-2 text-gray-500 italic font-bold">Henüz dosya seçilmedi</div>
                    </div>
                    
                    <button onclick="ilanKaydet()" id="saveBtn" class="w-full bg-blue-700 text-white p-4 rounded-xl font-extrabold shadow-lg">PORTFÖYE EKLE</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 min-h-screen">
                <div class="flex justify-between items-center border-b pb-4 mb-6">
                    <h3 class="font-extrabold text-gray-800 uppercase tracking-tighter">GÜNCEL İLANLAR</h3>
                    <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full" id="totalCount">0 İlan</span>
                </div>
                <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://svugeytllwprshrftbmf.supabase.co";
    const SUPABASE_KEY = "SENİN_ANON_PUBLIC_KEYİNİ_BURAYA_YAPIŞTIR"; 
    const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Oturum Kontrolü
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userInfo').classList.replace('hidden', 'flex');
            document.getElementById('userEmail').innerText = user.email;
            ilanlariGetir();
        }
    }

    // Giriş-Kayıt Geçişi
    function toggleAuth(showLogin) {
        document.getElementById('loginForm').classList.toggle('hidden', !showLogin);
        document.getElementById('registerForm').classList.toggle('hidden', showLogin);
        document.getElementById('loginTab').classList.toggle('active', showLogin);
        document.getElementById('registerTab').classList.toggle('active', !showLogin);
        if(!showLogin) document.getElementById('loginTab').classList.add('text-gray-500');
        else document.getElementById('registerTab').classList.add('text-gray-500');
    }

    // Kayıt
    async function register() {
        const { count } = await supabase.from('personeller').select('*', { count: 'exact', head: true });
        if (count >= 12) return alert("Sistemde 12 personel sınırı dolmuştur.");
        
        const ad = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;

        const { data, error } = await supabase.auth.signUp({ email, password: pass });
        if (error) alert(error.message);
        else {
            await supabase.from('personeller').insert([{ id: data.user.id, ad_soyad: ad, email: email }]);
            alert("Kayıt başarılı! Şimdi giriş yapabilirsiniz.");
            location.reload();
        }
    }

    // Giriş
    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) alert("E-posta veya şifre hatalı!");
        else location.reload();
    }

    // İlan Kaydı
    async function ilanKaydet() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "YÜKLENİYOR...";
        btn.disabled = true;

        const files = document.getElementById('pGorsel').files;
        const urls = [];

        for (let file of files) {
            const opt = { maxSizeMB: 0.15, maxWidthOrHeight: 1200 };
            const comp = await imageCompression(file, opt);
            const name = `${Date.now()}-${Math.random().toString(36).substr(2, 5)}.jpg`;
            const { data } = await supabase.storage.from('portfoy-gorselleri').upload(name, comp);
            if (data) urls.push(data.path);
        }

        const { error } = await supabase.from('ilanlar').insert([{
            baslik: document.getElementById('pBaslik').value,
            kategori: document.getElementById('pKategori').value,
            il: document.getElementById('pIl').value,
            ilce: document.getElementById('pIlce').value,
            tam_adres: document.getElementById('pAdres').value,
            fiyat: document.getElementById('pFiyat').value,
            gorsel_linkleri: urls,
            ekleyen_personel_ad: document.getElementById('userEmail').innerText
        }]);

        if (error) alert("Hata: " + error.message);
        else location.reload();
    }

    // Listeleme
    async function ilanlariGetir() {
        const { data } = await supabase.from('ilanlar').select('*').order('created_at', { ascending: false });
        document.getElementById('totalCount').innerText = `${data.length} İlan`;
        const list = document.getElementById('ilanListesi');
        list.innerHTML = data.map(i => `
            <div class="bg-gray-50 rounded-xl overflow-hidden border border-gray-100 shadow-sm">
                <div class="h-40 bg-cover bg-center" style="background-image: url('${SUPABASE_URL}/storage/v1/object/public/portfoy-gorselleri/${i.gorsel_linkleri[0] || ''}')"></div>
                <div class="p-4">
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold">${i.kategori}</span>
                    <h4 class="font-bold text-gray-800 mt-1">${i.baslik}</h4>
                    <p class="text-blue-700 font-extrabold text-lg">${Number(i.fiyat).toLocaleString()} ₺</p>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase italic font-bold">👤 ${i.ekleyen_personel_ad.split('@')[0]}</p>
                </div>
            </div>
        `).join('');
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }
    window.onload = checkUser;
    document.getElementById('pGorsel').onchange = function() {
        document.getElementById('fileStatus').innerText = this.files.length + " fotoğraf seçildi";
    };
</script>
</body>
</html>
