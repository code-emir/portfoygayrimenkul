<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emlak Portföy Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
</head>
<body class="bg-slate-50 font-sans">

<div id="app" class="min-h-screen">
    <nav class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-blue-700">EMLAK PRO</h1>
        <div id="userInfo" class="hidden items-center gap-4">
            <span id="userEmail" class="text-xs font-bold text-gray-500"></span>
            <button onclick="logout()" class="text-red-500 text-xs font-bold">ÇIKIŞ</button>
        </div>
    </nav>

    <div id="authSection" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-2xl shadow-xl border-t-4 border-blue-600">
        <div class="flex border-b mb-6 text-center">
            <button id="loginTab" onclick="toggleAuth(true)" class="flex-1 pb-2 font-bold text-blue-600 border-b-2 border-blue-600">Giriş</button>
            <button id="regTab" onclick="toggleAuth(false)" class="flex-1 pb-2 font-bold text-gray-400">Yeni İşletme</button>
        </div>
        
        <div id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="E-posta" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
            <input type="password" id="password" placeholder="Şifre" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black">SİSTEME GİR</button>
        </div>

        <div id="registerForm" class="hidden space-y-4">
            <input type="text" id="regName" placeholder="İşletme Adı" class="w-full border p-3 rounded-xl outline-none">
            <input type="email" id="regEmail" placeholder="Yönetici E-posta" class="w-full border p-3 rounded-xl outline-none">
            <input type="password" id="regPass" placeholder="Yönetici Şifresi" class="w-full border p-3 rounded-xl outline-none">
            <button onclick="register()" class="w-full bg-green-600 text-white p-4 rounded-xl font-black">KAYIT OL</button>
        </div>
    </div>

    <div id="mainSection" class="hidden p-4 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-6">
        <div class="md:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold mb-4">YENİ İLAN</h3>
                <input type="text" id="pBaslik" placeholder="Başlık" class="w-full border p-2 rounded mb-2">
                <input type="number" id="pFiyat" placeholder="Fiyat" class="w-full border p-2 rounded mb-2">
                <input type="file" id="pGorsel" multiple class="w-full text-xs mb-2">
                <button onclick="saveIlan()" id="saveBtn" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">EKLE</button>
            </div>
            <div id="staffSection" class="hidden bg-orange-50 p-6 rounded-xl border border-orange-200">
                <h3 class="font-bold text-orange-700 mb-4 uppercase text-xs">Personel Ekle</h3>
                <input type="email" id="sEmail" placeholder="Personel Mail" class="w-full border p-2 rounded mb-2">
                <input type="text" id="sPass" placeholder="4 Haneli Şifre" maxlength="4" class="w-full border p-2 rounded mb-2">
                <button onclick="addStaff()" class="w-full bg-orange-600 text-white p-3 rounded-xl font-bold text-xs">YETKİ VER</button>
            </div>
        </div>
        <div class="md:col-span-8 bg-white p-6 rounded-xl shadow-sm border min-h-screen">
            <h3 class="font-bold mb-6 border-b pb-2">İLANLAR</h3>
            <div id="listArea" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </div>
</div>

<script>
    const S_URL = "https://svugeytllwprshrftbmf.supabase.co";
    const S_KEY = "Sb_publishable_i2zuuZi8dZ-wN4b-aO5HVQ_fGUk2miT";
    const _db = supabase.createClient(S_URL, S_KEY);

    function toggleAuth(isLogin) {
        document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
        document.getElementById('registerForm').classList.toggle('hidden', isLogin);
        document.getElementById('loginTab').className = isLogin ? "flex-1 pb-2 font-bold text-blue-600 border-b-2 border-blue-600" : "flex-1 pb-2 font-bold text-gray-400";
        document.getElementById('regTab').className = !isLogin ? "flex-1 pb-2 font-bold text-blue-600 border-b-2 border-blue-600" : "flex-1 pb-2 font-bold text-gray-400";
    }

    async function register() {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const name = document.getElementById('regName').value;
        const { data, error } = await _db.auth.signUp({ email, password: pass });
        if (error) alert(error.message);
        else {
            await _db.from('personeller').insert([{ id: data.user.id, ad_soyad: name, email: email, yetki: 'sahip' }]);
            alert("Başarılı! Giriş yapın.");
            location.reload();
        }
    }

    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const { error } = await _db.auth.signInWithPassword({ email, password: pass });
        if (error) alert("Hata: Giriş bilgileri yanlış.");
        else location.reload();
    }

    async function checkUser() {
        const { data: { user } } = await _db.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userInfo').classList.replace('hidden', 'flex');
            document.getElementById('userEmail').innerText = user.email;
            const { data: prof } = await _db.from('personeller').select('yetki').eq('id', user.id).single();
            if (prof && prof.yetki === 'sahip') document.getElementById('staffSection').classList.remove('hidden');
            getIlanlar();
        }
    }

    async function addStaff() {
        const email = document.getElementById('sEmail').value;
        const pass = document.getElementById('sPass').value;
        const { data, error } = await _db.auth.signUp({ email, password: pass });
        if (error) alert(error.message);
        else {
            await _db.from('personeller').insert([{ id: data.user.id, email: email, yetki: 'personel' }]);
            alert("Personel eklendi. Şifre: " + pass);
        }
    }

    async function saveIlan() {
        const btn = document.getElementById('saveBtn');
        const files = document.getElementById('pGorsel').files;
        if(files.length === 0) return alert("Resim seç!");
        btn.innerText = "Yükleniyor...";
        btn.disabled = true;
        const urls = [];
        for (let f of files) {
            const comp = await imageCompression(f, { maxSizeMB: 0.1 });
            const path = `${Date.now()}-${Math.random().toString(36).substr(2,3)}.jpg`;
            const { data } = await _db.storage.from('portfoy-gorselleri').upload(path, comp);
            if (data) urls.push(data.path);
        }
        await _db.from('ilanlar').insert([{
            baslik: document.getElementById('pBaslik').value,
            fiyat: document.getElementById('pFiyat').value,
            gorsel_linkleri: urls,
            ekleyen_personel_ad: document.getElementById('userEmail').innerText
        }]);
        location.reload();
    }

    async function getIlanlar() {
        const { data } = await _db.from('ilanlar').select('*').order('created_at', { ascending: false });
        const area = document.getElementById('listArea');
        area.innerHTML = data.map(i => `
            <div class="border rounded-xl overflow-hidden bg-white shadow-sm">
                <img src="${S_URL}/storage/v1/object/public/portfoy-gorselleri/${i.gorsel_linkleri[0]}" class="h-32 w-full object-cover">
                <div class="p-3">
                    <p class="font-bold text-sm">${i.baslik}</p>
                    <p class="text-blue-600 font-black">${i.fiyat} ₺</p>
                </div>
            </div>
        `).join('');
    }

    async function logout() { await _db.auth.signOut(); location.reload(); }
    window.onload = checkUser;
</script>
</body>
</html>
