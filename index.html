<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Emlak Portföy Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
        .akin-card { background: white; border-top: 5px solid #1a56db; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #1a56db; color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #1e429f; transform: translateY(-1px); }
    </style>
</head>
<body>

<div id="app" class="min-h-screen">
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-700 text-white p-2 rounded-lg">🏠</div>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tight">EMLAK<span class="text-blue-700">PRO</span></h1>
        </div>
        <div id="userInfo" class="hidden items-center gap-4">
            <span id="userEmail" class="text-sm font-medium text-gray-600 bg-gray-100 px-3 py-1 rounded-full"></span>
            <button onclick="logout()" class="text-red-600 text-sm font-bold hover:underline">Güvenli Çıkış</button>
        </div>
    </nav>

    <div id="authSection" class="max-w-md mx-auto mt-20 p-4">
        <div class="akin-card p-8">
            <div id="loginForm">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Yönetim Paneli</h2>
                <input type="email" id="email" placeholder="E-posta" class="w-full border p-3 rounded-lg mb-4 outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="password" placeholder="Şifre" class="w-full border p-3 rounded-lg mb-6 outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="login()" class="w-full btn-primary p-3 rounded-lg font-bold">GİRİŞ YAP</button>
                <p class="mt-6 text-center text-gray-500 text-sm">Hesabınız yok mu? <a href="#" onclick="toggleAuth(false)" class="text-blue-700 font-bold">Personel Kaydı Oluştur</a></p>
            </div>
            <div id="registerForm" class="hidden">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Yeni Personel</h2>
                <input type="text" id="regName" placeholder="Ad Soyad" class="w-full border p-3 rounded-lg mb-4 outline-none">
                <input type="email" id="regEmail" placeholder="E-posta" class="w-full border p-3 rounded-lg mb-4 outline-none">
                <input type="password" id="regPass" placeholder="Şifre Oluştur" class="w-full border p-3 rounded-lg mb-6 outline-none">
                <button onclick="register()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">KAYDI TAMAMLA</button>
                <p class="mt-6 text-center text-gray-500 text-sm">Zaten üye misiniz? <a href="#" onclick="toggleAuth(true)" class="text-blue-700 font-bold">Giriş'e Dön</a></p>
            </div>
        </div>
    </div>

    <div id="mainSection" class="hidden max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4">
            <div class="akin-card p-6 sticky top-24">
                <h3 class="font-bold border-b pb-3 mb-5 text-gray-800 flex items-center gap-2">
                    <span>📝</span> YENİ İLAN GİRİŞİ
                </h3>
                <div class="space-y-4">
                    <select id="pKategori" class="w-full border p-2.5 rounded-lg bg-gray-50">
                        <option value="Satılık Konut">Satılık Konut</option>
                        <option value="Kiralık Konut">Kiralık Konut</option>
                        <option value="Satılık Arsa">Satılık Arsa</option>
                        <option value="İş Yeri">İş Yeri / Ofis</option>
                        <option value="Devren">Devren Kiralık/Satılık</option>
                    </select>
                    
                    <input type="text" id="pBaslik" placeholder="İlan Başlığı (Örn: Havuzlu Villa)" class="w-full border p-2.5 rounded-lg">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="pIl" placeholder="Şehir" class="border p-2.5 rounded-lg">
                        <input type="text" id="pIlce" placeholder="İlçe" class="border p-2.5 rounded-lg">
                    </div>
                    
                    <textarea id="pAdres" placeholder="Tam Adres ve Mahalle Bilgisi" class="w-full border p-2.5 rounded-lg h-20"></textarea>
                    
                    <div class="relative">
                        <input type="number" id="pFiyat" placeholder="Fiyat" class="w-full border p-2.5 rounded-lg font-bold text-blue-700">
                        <span class="absolute right-3 top-2.5 text-gray-400">₺</span>
                    </div>

                    <div class="border-2 border-dashed border-blue-200 p-4 rounded-xl bg-blue-50 text-center">
                        <label class="cursor-pointer block">
                            <span class="text-2xl">📸</span>
                            <span class="block text-sm font-bold text-blue-700 mt-1 text-center">FOTOĞRAF EKLE</span>
                            <span class="text-[10px] text-blue-400">(Kamera veya Galeriden)</span>
                            <input type="file" id="pGorsel" multiple accept="image/*" class="hidden">
                        </label>
                        <div id="fileStatus" class="text-[10px] mt-2 text-gray-500 italic">Henüz dosya seçilmedi</div>
                    </div>
                    
                    <button onclick="ilanKaydet()" id="saveBtn" class="w-full btn-primary p-4 rounded-xl font-extrabold uppercase tracking-widest shadow-lg">SİSTEME İŞLE</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 min-h-screen">
                <div class="flex justify-between items-center border-b pb-4 mb-6">
                    <h3 class="font-extrabold text-gray-800 uppercase tracking-tighter">GÜNCEL PORTFÖY LİSTESİ</h3>
                    <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full" id="totalCount">0 İlan</span>
                </div>
                <div id="ilanListesi" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://svugeytllwprshrftbmf.supabase.co";
    const SUPABASE_KEY = "BURAYA_ANON_PUBLIC_KEY_GELECEK"; 
    const supabase = lib.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Oturum Kontrolü
    async function checkUser() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainSection').classList.remove('hidden');
            document.getElementById('userInfo').classList.remove('flex');
            document.getElementById('userInfo').classList.add('flex');
            document.getElementById('userEmail').innerText = user.email;
            ilanlariGetir();
        }
    }

    // Giriş/Kayıt Panel Geçişi
    function toggleAuth(showLogin) {
        document.getElementById('loginForm').classList.toggle('hidden', !showLogin);
        document.getElementById('registerForm').classList.toggle('hidden', showLogin);
    }

    // Kayıt (12 Kişi Sınırı)
    async function register() {
        const { count } = await supabase.from('personeller').select('*', { count: 'exact', head: true });
        if (count >= 12) { return alert("Ofis kapasitesi (12 kişi) dolmuştur."); }
        
        const ad = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;

        const { data, error } = await supabase.auth.signUp({ email, password: pass });
        if (error) alert(error.message);
        else {
            await supabase.from('personeller').insert([{ id: data.user.id, ad_soyad: ad, email: email }]);
            alert("Kayıt başarılı! Giriş yapabilirsiniz.");
            location.reload();
        }
    }

    async function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (error) alert("Hatalı giriş!");
        else location.reload();
    }

    // İlan Kaydetme (Sıkıştırmalı & Çoklu Görsel)
    async function ilanKaydet() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "YÜKLENİYOR...";
        saveBtn.disabled = true;

        const gorselFiles = document.getElementById('pGorsel').files;
        const gorselUrller = [];

        for (let file of gorselFiles) {
            const options = { maxSizeMB: 0.15, maxWidthOrHeight: 1200 }; // 150KB hedefi
            const compressedFile = await imageCompression(file, options);
            const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.jpg`;
            
            const { data } = await supabase.storage.from('portfoy-gorselleri').upload(fileName, compressedFile);
            if (data) gorselUrller.push(data.path);
        }

        const { error } = await supabase.from('ilanlar').insert([{
            baslik: document.getElementById('pBaslik').value,
            kategori: document.getElementById('pKategori').value,
            il: document.getElementById('pIl').value,
            ilce: document.getElementById('pIlce').value,
            tam_adres: document.getElementById('pAdres').value,
            fiyat: document.getElementById('pFiyat').value,
            gorsel_linkleri: gorselUrller,
            ekleyen_personel_ad: document.getElementById('userEmail').innerText
        }]);

        if (error) alert("Kayıt hatası: " + error.message);
        else {
            alert("İlan portföye eklendi!");
            location.reload();
        }
    }

    async function ilanlariGetir() {
        const { data } = await supabase.from('ilanlar').select('*').order('created_at', { ascending: false });
        document.getElementById('totalCount').innerText = `${data.length} İlan`;
        const liste = document.getElementById('ilanListesi');
        liste.innerHTML = data.map(ilan => `
            <div class="bg-gray-50 rounded-xl overflow-hidden border border-gray-100 hover:shadow-md transition group">
                <div class="h-48 bg-gray-200 bg-cover bg-center group-hover:scale-105 transition-transform" 
                     style="background-image: url('${SUPABASE_URL}/storage/v1/object/public/portfoy-gorselleri/${ilan.gorsel_linkleri[0] || ''}')">
                    <div class="bg-blue-600 text-white text-[10px] font-bold px-2 py-1 inline-block m-2 rounded">${ilan.kategori}</div>
                </div>
                <div class="p-4">
                    <h4 class="font-bold text-gray-800 leading-tight h-10 overflow-hidden">${ilan.baslik}</h4>
                    <p class="text-blue-700 font-extrabold text-lg mt-2">${Number(ilan.fiyat).toLocaleString()} ₺</p>
                    <div class="text-[10px] text-gray-500 mt-1">📍 ${ilan.il} / ${ilan.ilce}</div>
                    <div class="mt-4 pt-3 border-t flex justify-between items-center">
                        <span class="text-[9px] font-bold text-gray-400 uppercase italic">👤 ${ilan.ekleyen_personel_ad.split('@')[0]}</span>
                        <button class="text-blue-600 text-[10px] font-bold">Detay →</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }
    window.onload = checkUser;

    // Dosya seçildiğinde durum güncelleme
    document.getElementById('pGorsel').onchange = function() {
        document.getElementById('fileStatus').innerText = this.files.length + " fotoğraf seçildi";
    };
</script>

</body>
</html>
